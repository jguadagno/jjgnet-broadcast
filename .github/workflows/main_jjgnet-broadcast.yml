# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Publish Azure Function App - jjgnet-broadcast

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write #This is required for requesting the JWT
  contents: read

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  DOTNET_VERSION: '10.0.x' # set this to the dotnet version to use
  WORKING_DIRECTORY: './src/JosephGuadagno.Broadcasting.Functions'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Check out the repository code
      - uses: actions/checkout@v4

      # Set up the .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Restore NuGet packages
      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.WORKING_DIRECTORY }}

      # Build in Release mode
      - name: Build
        run: dotnet build --configuration Release --no-restore
        working-directory: ${{ env.WORKING_DIRECTORY }}

      # Run unit tests
      - name: Run tests
        run: dotnet test ./src/JosephGuadagno.Broadcasting.Functions.Tests/JosephGuadagno.Broadcasting.Functions.Tests.csproj --configuration Release --verbosity normal

      # Publish the function app for deployment
      - name: Publish
        run: dotnet publish --configuration Release --output ./publish
        working-directory: ${{ env.WORKING_DIRECTORY }}

      # Upload the published output as an artifact for the deployment job
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: function-app
          path: ${{ env.WORKING_DIRECTORY }}/publish
          include-hidden-files: 'true'

  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      # Download the build artifact from the previous job
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: function-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.FUNCTIONAPP_CLIENT_ID }}
          tenant-id: ${{ secrets.FUNCTIONAPP_TENANT_ID }}
          subscription-id: ${{ secrets.FUNCTIONAPP_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        uses: Azure/functions-action@v1
        id: fa-staging
        with:
          app-name: 'jjgnet-broadcast'
          slot-name: 'staging'
          package: ./publish

  swap-to-production:
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    environment: production

    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.FUNCTIONAPP_CLIENT_ID }}
          tenant-id: ${{ secrets.FUNCTIONAPP_TENANT_ID }}
          subscription-id: ${{ secrets.FUNCTIONAPP_SUBSCRIPTION_ID }}

      - name: Swap staging to production
        run: |
          az functionapp deployment slot swap \
            --name jjgnet-broadcast \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --slot staging \
            --target-slot production
