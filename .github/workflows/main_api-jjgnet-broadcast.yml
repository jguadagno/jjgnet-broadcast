# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Publish API App to Azure - api-jjgnet-broadcast

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  id-token: write #This is required for requesting the JWT
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore ./src/JosephGuadagno.Broadcasting.Api

      # Fails build on Critical CVEs. High/Medium/Low are logged for review.
      # Known existing: Newtonsoft.Json 10.0.2 (NU1903, High) — tracked in issue #303 backlog.
      - name: Check for vulnerable NuGet packages
        run: |
          dotnet list ./src/JosephGuadagno.Broadcasting.Api package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "Critical" vuln-report.txt; then
            echo "❌ Critical vulnerabilities found — failing build"
            exit 1
          fi
          echo "⚠️ Vulnerability scan complete. Review vuln-report.txt for non-critical findings."

      - name: Build with dotnet
        run: dotnet build ./src/JosephGuadagno.Broadcasting.Api --configuration Release --no-restore

      - name: Test
        run: dotnet test ./src/JosephGuadagno.Broadcasting.Api.Tests --no-build --verbosity normal --configuration Release

      - name: dotnet publish
        run: dotnet publish ./src/JosephGuadagno.Broadcasting.Api -c Release -o ${{env.DOTNET_ROOT}}/api-jjgnet-broadcast

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v7
        with:
          name: .api-app
          path: ${{env.DOTNET_ROOT}}/api-jjgnet-broadcast

  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'staging'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: .api-app

      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.API_CLIENT_ID }}
          tenant-id: ${{ secrets.API_TENANT_ID }}
          subscription-id: ${{ secrets.API_SUBSCRIPTION_ID }}

      - name: Deploy to staging slot
        id: deploy-to-staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-jjgnet-broadcast'
          slot-name: 'staging'
          package: .

  swap-to-production:
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    environment:
      name: 'production'
      url: ${{ steps.get-url.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read

    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.API_CLIENT_ID }}
          tenant-id: ${{ secrets.API_TENANT_ID }}
          subscription-id: ${{ secrets.API_SUBSCRIPTION_ID }}

      - name: Swap staging to production
        run: |
          az webapp deployment slot swap \
            --name api-jjgnet-broadcast \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --slot staging \
            --target-slot production

      - name: Stop staging slot
        run: |
          az webapp stop \
            --name api-jjgnet-broadcast \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --slot staging

      - name: Get production URL
        id: get-url
        run: |
          url=$(az webapp show --name api-jjgnet-broadcast --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --query defaultHostName -o tsv)
          echo "webapp-url=https://$url" >> $GITHUB_OUTPUT
